
<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join WhatsApp Group</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f7fb;
      display:flex;

      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      background:#fff;
      width:100%;
      max-width:450px;
      padding:35px;
      border-radius:15px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
      text-align:center;
    }

    h1{
      color:#0a5cff;
      margin-bottom:15px;
    }

    p{
      color:#555;
      margin-bottom:25px;
      line-height:1.6;
    }

    .price{
      background:#0a5cff;
      color:#fff;
      padding:15px;
      border-radius:10px;
      margin-bottom:25px;
      font-size:22px;
      font-weight:bold;
    }

    .btn{
      display:inline-block;
      width:100%;
      padding:15px;
      background:#25D366;

      color:#fff;
      text-decoration:none;
      border-radius:10px;
      font-size:18px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      background:#1da851;
    }

    .note{
      margin-top:20px;
      font-size:14px;
      color:#888;
    }
  </style>
</head>

<body>


  <div class="container">

    <h1>SBF WhatsApp Group</h1>

    <p>
      Join the Solid Biblical Foundation exclusive WhatsApp group after successful payment verification.
    </p>

    <div class="price">
      Access Fee: At least GHS 10
    </div>

    <a href="success.html" class="btn">
      Continue to Payment
    </a>

    <div class="note">
      After payment, upload your screenshot or transaction ID for admin verification.

    </div>

  </div>

</body>
</html>
